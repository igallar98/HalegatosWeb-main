hero:
  eyebrow: Patrocinios
  title: Remamos juntos
  lead: Colaboraciones que conectan deporte, inclusion, visibilidad y comunidad en un proyecto con identidad propia.
  image: /static/images/CABECERA-08.png
  alt: Imagen de ambiente deportivo para la seccion de patrocinios.
  chips:
    - Patrocinadores
    - Colaboradores
    - Patrocinadores de eventos

intro:
  eyebrow: Por que colaborar
  title: Un club con presencia, valores claros y una comunidad muy viva.
  text: Halegatos ofrece una plataforma honesta para colaborar con un proyecto que une deporte, inclusion y visibilidad. Nos interesa construir relaciones utiles para ambas partes, con sentido y continuidad.
  points:
    - Visibilidad vinculada a deporte inclusivo y comunidad activa.
    - Acciones conjuntas en eventos, equipaciones o actividades del club.
    - Colaboraciones adaptadas al tipo de marca o institucion.

scholarships:
  eyebrow: Becas e integracion
  title: El deporte tambien puede ser una puerta de entrada
  text: Halegatos trabaja con ONGs y entidades sociales para facilitar, cuando es posible, el acceso al club de personas refugiadas o solicitantes de asilo. Buscamos que el deporte tambien sea un espacio de acompanamiento, pertenencia e integracion.
  points:
    - Colaboraciones con impacto social real dentro y fuera del agua.
    - Itinerarios de acompanamiento adaptados a cada situacion.
    - Una forma concreta de apoyar inclusion, salud y comunidad.

