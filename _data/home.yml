      description: "Escapadas para compartir tiempo, descubrir ciudades y seguir haciendo equipo fuera del entrenamiento."
    - image: "/static/images/ocio_VisitaMuseo.png"
      alt: "Miembros del club durante una visita al museo"
      title: "Visita al museo"
      description: "Planes culturales para mezclar grupos y compartir una tarde distinta con gente del club."
    - image: "/static/images/ocio_celebracioncumplea%C3%B1os.png"
      alt: "Celebracion social del club"
      title: "Fiesta y celebracion"
      description: "Encuentros para celebrar, juntarnos mas y seguir construyendo comunidad."
    - image: "/static/images/ocio_activismoVIH.png"
      alt: "Participacion del club en una accion por el Dia Mundial del VIH"
