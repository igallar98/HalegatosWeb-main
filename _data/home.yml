highlights:
  eyebrow: "Deporte, ocio y pertenencia"
  title: "Mucho mas que entrenar metros."
  lead: "Entrenamos con estructura, compartimos planes fuera del agua y cuidamos que todo el mundo encuentre su sitio."
  items:
    - icon: "waves"
      title: "Entrenar con acompanamiento de verdad"
      description: "Tenemos natacion y aguas abiertas con entrenador que adapta, motiva y acompana a cada persona para que avance a su ritmo con confianza."
    - icon: "sparkles"
      title: "HaleOcio tambien forma parte del club"
      description: "No solo entrenamos: organizamos actividades sociales, viajes, cine, teatro, cenas y fiestas para seguir haciendo equipo fuera del agua."
    - icon: "heart"
      title: "Aqui caben todos los niveles"
      description: "Ya vengas con experiencia o estes empezando desde cero, hay un hueco para ti en un espacio inclusivo, cercano y ambicioso."
gallery:
  eyebrow: "Asi se vive Halegatos"
  title: "Momentos para entender Halegatos."
  lead: "Del entrenamiento a HaleOcio, imagen a imagen para dar protagonismo a lo importante."
  slides:
    - image: "/static/images/ocio_viajeviena.png"
      alt: "Grupo de Halegatos en una escapada a Viena"
