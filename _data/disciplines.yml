items:
  - title: Natacion
    eyebrow: Tecnica, constancia y competicion
    image: /static/images/disciplinasnatacion.png
    alt: Nadadores entrenando en piscina.
    description: Entrenamientos por niveles para mejorar tecnica, resistencia y ritmo de competicion sin perder el lado humano del club.
    levels_title: Todos los niveles
    levels: *swim_levels
    features:
      - Grupos adaptados por ritmo
      - Seguimiento tecnico
      - Preparacion para campeonatos
    locations_title: Donde entrenamos
    locations: *swim_locations
    actions:
      - label: Inscribete
        url: /join/
        style: primary
  - title: Aguas abiertas
    eyebrow: Fondo, orientacion y comunidad
    image: /static/images/disciplinas aguasabiertas.png
    alt: Grupo durante una actividad de aguas abiertas.
    description: Salidas, travesias y preparacion especifica para disfrutar del mar y los pantanos con seguridad, progresion y apoyo del equipo.
    features:
      - Sesiones de orientacion
      - Planificacion estacional
      - Travesias y eventos del club
    locations_title: Donde entrenamos
    locations: *swim_locations
    actions:
      - label: Inscribete
        url: /join/
        style: primary
      - label: Programa de guias
        url: /guias-aguas-abiertas/
        style: secondary
  - title: Saltos
    eyebrow: Tecnica, confianza y expresion corporal
    image: /static/images/disciplinassaltos.png
    alt: Deportista durante una sesion de saltos.
    description: Un entorno seguro para aprender desde la base, ganar confianza y pulir la tecnica con progresiones adaptadas a cada persona.
    features:
      - Trabajo tecnico progresivo
      - Perfeccionamiento de entradas
      - Sesiones para distintos niveles
    locations_title: Donde entrenamos
    locations:
      - name: Centro Deportivo M86
        address: Calle de Jos&eacute; Mart&iacute;nez de Velasco 3, 28007 Madrid
        url: https://www.google.com/maps/search/?api=1&query=Centro+Deportivo+M86+Calle+de+Jose+Martinez+de+Velasco+3+28007+Madrid
    actions:
      - label: Inscribete
        url: /join/
        style: primary
