intro:
  eyebrow: Asi funciona
  title: Un proceso simple para empezar
  text: Queremos que inscribirte sea facil y rapido.
  steps:
    - title: Elige modalidad
      text: Puedes apuntarte a saltos o pedir informacion sobre HaleFederado.
    - title: Completa tu alta
      text: Rellena el formulario o escribenos por correo y te ayudamos con el proceso.

disciplines:
  - eyebrow: Saltos
