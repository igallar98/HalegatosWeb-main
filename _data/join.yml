hero:
  eyebrow: Inscripciones
  title_html: "&iquest;Listo para lanzarte?"
  lead: Ven a probar en natacion, conoce tu nivel y recibe toda la informacion sin compromiso antes de decidir. Si ya tienes claro lo que buscas, aqui tambien tienes el acceso para saltos y el resto de tramites.
  image: /static/images/CABECERA-03.jpg
  alt: Deportistas de Halegatos durante una sesion en piscina.
  chips:
    - Prueba gratis en natacion
    - Valoracion de nivel
    - Contacto directo por correo

intro:
  eyebrow: Asi funciona
  title: Tres pasos simples para empezar.
  text: Queremos que el proceso sea claro, corto y sin presion.
  steps:
    - title: Escribenos
      text: Dinos si te interesa natacion, saltos o aguas abiertas.
    - title: Pruebas un dia y te conocemos
      text: Si vienes a natacion, vemos tu nivel y te damos toda la informacion de tarifas y opciones.
    - title: Si te encaja, te inscribes
      text: Completa la inscripcion y ya formas parte del club.

disciplines:
