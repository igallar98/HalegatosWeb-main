help:
  title: Te ayudamos antes de que rellenes nada
  text: Si no tienes claro donde encajas, si cumples la edad minima o que modalidad te conviene mas, escribenos primero y te orientamos con calma.
  email: inscripciones@halegatos.com

federated:
  eyebrow: HaleFederado
  title: Entrena con Halegatos estes donde estes
  text: HaleFederado es la modalidad para quienes quieren pertenecer al club aunque no entrenen presencialmente con nosotrxs. Pagas una cuota, recibes los entrenamientos online por correo y formas parte del club para actividades de ocio.
  highlights:
    - Cuota para pertenecer al club
    - Entrenamientos online por correo
    - Actividades de ocio con el club
    - Pensado para quienes viven fuera o viajan
  contact_title: Contacto HaleFederado
  contact_text: Si te interesa esta modalidad, escribenos y te contamos como funciona, cuanto cuesta y como darte de alta.
  email: halegatos@halegatos.com
  action_label: Quiero informacion
