    accent: orange
    contacts:
      - title: Contacto de saltos
        text: Escribenos y te contamos como funciona la seccion y como inscribirte.
        email: saltos@halegatos.com
    actions:
      - label: Contactar con saltos
        url: mailto:saltos@halegatos.com
        style: primary
      - label: Formulario de inscripcion
        url: https://docs.google.com/forms/d/e/1FAIpQLSeCQLCKGxlPrOvjjY70FHBZo6oRv0J5QLpd3DNY8PnIxXWWGg/viewform
        style: secondary

  - eyebrow: HaleFederado
    title: Entrena con Halegatos estes donde estes
    description: Una modalidad para formar parte del club aunque no entrenes presencialmente con nosotrxs.
    accent: blue
    contacts:
      - title: Informacion HaleFederado
        text: Escribenos y te contamos como funciona y como darte de alta.
        email: halegatos@halegatos.com
    actions:
      - label: Quiero informacion
        url: mailto:halegatos@halegatos.com
        style: primary

help:
