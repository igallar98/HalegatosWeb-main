<head>
  {% assign canonical_href = page.url | relative_url %}
  {% if site.url and site.url != '' %}
    {% assign canonical_href = page.url | absolute_url %}
  {% endif %}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}" />
  <meta name="keywords" content="{{ page.keywords | default: site.keywords | strip_html | strip_newlines }}" />
  <link rel="canonical" href="{{ canonical_href }}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | strip_newlines }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ canonical_href }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
