{% assign tone = include.tone | default: 'dark' %}
<section class="page-hero page-hero--{{ tone }}">
  <div class="container page-hero__inner">
    {% if include.eyebrow %}
      <p class="eyebrow">{{ include.eyebrow }}</p>
    {% endif %}
    <h1>{{ include.title }}</h1>
    {% if include.lead %}
      <p class="page-hero__lead">{{ include.lead }}</p>
    {% endif %}
  </div>
</section>
